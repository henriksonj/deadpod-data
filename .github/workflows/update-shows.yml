name: Update Shows

on:
  schedule:
    # Every Friday at 8:05 PM EDT (00:05 UTC Saturday)
    - cron: '5 0 * * 6'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  commit-shows:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Commit and push if shows.json changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shows.json
          if git diff --cached --quiet; then
            echo "No changes to shows.json — nothing to commit."
          else
            git commit -m "auto: update shows.json $(date -u +'%Y-%m-%d')"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
