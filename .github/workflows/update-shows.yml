name: Update Shows

on:
  schedule:
    # Every Friday at 8:05 PM EDT (00:05 UTC Saturday)
    - cron: '5 0 * * 6'
  workflow_dispatch:   # allow manual trigger from GitHub UI

jobs:
  scrape-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Run scrape_recent.py
        run: python scrape_recent.py

      - name: Export shows.json
        run: |
          # If export_shows.py lives in the repo, run it.
          # Otherwise scrape_recent.py is expected to write shows.json directly.
          if [ -f export_shows.py ]; then
            python export_shows.py
          fi

      - name: Commit and push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add shows.json
          if git diff --cached --quiet; then
            echo "No new shows — nothing to commit."
          else
            git commit -m "auto: update shows.json $(date -u +'%Y-%m-%d')"
            git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
